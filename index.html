<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alex Chen • Freelance Designer</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans">
  <header class="min-h-screen flex items-center justify-center border-b border-zinc-800">
    <div class="text-center max-w-2xl px-6">
      <h1 class="text-6xl font-bold tracking-tighter">Alex Chen</h1>
      <p class="mt-4 text-2xl text-emerald-400">Freelance Designer</p>
      <p class="mt-8 text-zinc-400">Minimal branding & websites for small businesses in Anchorage.</p>
      <a href="#contact" class="mt-12 inline-block bg-white text-zinc-950 px-10 py-5 rounded-full font-medium hover:bg-emerald-400 transition">Get in touch</a>
    </div>
  </header>

  <section class="py-20 px-6 max-w-4xl mx-auto">
    <h2 class="text-3xl font-semibold mb-12 text-center">Selected Work</h2>
    <div class="grid md:grid-cols-2 gap-8">
      <div class="bg-zinc-900 rounded-3xl p-8">
        <div class="h-48 bg-zinc-800 rounded-2xl mb-6"></div>
        <h3 class="font-medium">Local Coffee Shop Rebrand</h3>
        <p class="text-zinc-400 text-sm mt-2">Logo + website • 2025</p>
      </div>
      <div class="bg-zinc-900 rounded-3xl p-8">
        <div class="h-48 bg-zinc-800 rounded-2xl mb-6"></div>
        <h3 class="font-medium">Alaska Wilderness Tours</h3>
        <p class="text-zinc-400 text-sm mt-2">Website + print materials</p>
      </div>
    </div>
  </section>

  <footer id="contact" class="py-20 border-t border-zinc-800">
    <div class="max-w-md mx-auto px-6 text-center">
      <h3 class="text-2xl mb-8">Start a project</h3>
      <input type="text" placeholder="Name" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 mb-4">
      <input type="email" placeholder="Email" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 mb-6">
      <textarea placeholder="Tell me about your project..." rows="4" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-4 mb-6"></textarea>
      <button onclick="alert('Inquiry received! (demo)')" class="w-full bg-emerald-400 hover:bg-emerald-300 text-zinc-950 py-5 rounded-2xl font-medium">Send message</button>
    </div>
    <p class="text-center text-zinc-500 mt-12 text-sm">Anchorage, Alaska • Built by Savage Studio</p>
  </footer>
</body>
</html>
